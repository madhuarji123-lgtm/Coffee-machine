<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop</title>
    <link rel="stylesheet" href="style.css"/>
 </head>
<body>

    <header>
        <h1 class="header h1">Coffee Shop</h1>
    </header>

    <main class="app">

        <section class="panel">
        <div class="option-group">
                <h2>Drink</h2>
                <div class="radio-group">
                    <label>
                    <input type="radio" name="drink" value="espresso" checked>
                         Espresso
                    </label>

                    <label>
                    <input type="radio" name="drink" value="latte">
                         Latte
                    </label>

                    <label>
                    <input type="radio" name="drink" value="cappuccino">
                         Cappuccino
                    </label>

                    <label>
                    <input type="radio" name="drink" value="matcha">
                         Matcha
                    </label>

                    <label>
                    <input type="radio" name="drink" value="chai">
                         Chai
                    </label>
            </div>
            </div>
        <div class="option-group">
                <h2>Size</h2>
                <div class="radio-group">
                    <label>
                    <input type="radio" name="size" value="small">
                         Small
                    </label>

                    <label>
                    <input type="radio" name="size" value="medium" checked>
                         Medium
                    </label>

                    <label>
                    <input type="radio" name="size" value="large">
                         Large
                    </label>
            </div>
            </div>
        <div class="option-group">
                <h2>Milk</h2>
                <div class="radio-group">

                    <label>
                    <input type="radio" name="milk" value="regular" checked>
                        Regular
                    </label>

                    <label>
                    <input type="radio" name="milk" value="oat">
                        Oat
                    </label>

                    <label>
                    <input type="radio" name="milk" value="almond">
                         Almond
                    </label>

                    <label>
                    <input type="radio" name="milk" value="soy">
                         Soy
                    </label>

                    <label>
                    <input type="radio" name="milk" value="no milk">
                         No Milk
                    </label>
                    </div>
                </div>
        <div class="option-group">
              <h2>Extras</h2>
              <div class="checkbox-group">
                    <label>
                    <input type="checkbox" name="extras" value="whipped">
                         Whipped Cream
                    </label>

                    <label>
                    <input type="checkbox" name="extras" value="caramel">
                         Caramel Drizzle
                    </label>

                    <label>
                    <input type="checkbox" name="extras" value="chocolate">
                         Chocolate Shavings
                    </label>

                    <label>

                    </label>

              </div>

        </div>        
        </section>
     
        <section class="visual">
            <div class="cup-scene">
                <div class="cup" id="cup">
                    <div class="cup-fill"></div>
                    <div class="cup-shine"></div>
               </div>
                 <div class="cup-base"></div>
               <div class="cup-handle"></div>
               <div class="badges" id="badges">
                    <span class="badge" id="badge-whipped">+</span>
                    <span class="badge" id="badge-caramel">~</span>
                    <span class="badge" id="badge-chocolate">*</span>
               </div>
            </div>
            <section class="summary" id="summary"></section>
              
          
          </section>

         

          
        
    </main>
    <script src="script.js"></script>
    
</body>
</html>
